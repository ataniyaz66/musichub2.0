groups:
  - name: musichub-alerts
    rules:

      # ── Availability ──────────────────────────────────────
      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: "Target {{ $labels.instance }} has been unreachable for 30s"

      # ── Error Rate ────────────────────────────────────────
      - alert: HighErrorRate
        expr: rate(auth_http_requests_total{status=~"5.."}[1m]) > 0.5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.job }}"
          description: "Error rate is {{ $value }} errors/sec"

      # ── Slow Response ─────────────────────────────────────
      - alert: SlowResponse
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[2m])) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Slow responses on {{ $labels.job }}"
          description: "p95 latency is {{ $value }}s"

      # ── High CPU ──────────────────────────────────────────
      - alert: HighCpuUsage
        expr: rate(process_cpu_seconds_total[2m]) * 100 > 80
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.job }}"
          description: "CPU is {{ $value }}%"

      # ── High Memory ───────────────────────────────────────
      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024) > 400
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.job }}"
          description: "Memory is {{ $value }}MB"

      # ── Restart Loop ──────────────────────────────────────
      - alert: ContainerRestartLoop
        expr: increase(process_start_time_seconds[5m]) > 3
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Restart loop detected on {{ $labels.job }}"
          description: "Service has restarted multiple times in 5 minutes"