upstream auth_service {
    server auth-service:4001;
}

upstream song_service {
    server song-service:4002;
}

upstream user_service {
    server user-service:4003;
}

upstream chat_service {
    server chat-service:4004;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name localhost;

    # ── Frontend ─────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Auth Service ─────────────────────────────────────────
    location /api/auth/ {
        proxy_pass http://auth_service/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ── Song Service ─────────────────────────────────────────
    location /api/songs/ {
        proxy_pass http://song_service/api/songs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ── User Service ─────────────────────────────────────────
    location /api/users/ {
        proxy_pass http://user_service/api/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ── Chat Service (HTTP) ───────────────────────────────────
    location /api/chat/ {
        proxy_pass http://chat_service/api/chat/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # ── Chat Service (WebSocket / Socket.io) ──────────────────
    location /socket.io/ {
        proxy_pass http://chat_service/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Health check ─────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }
}