<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Form — MusicHub</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="container" style="max-width:600px">
    <div class="page-header">
      <h1 id="form-title">Add Song</h1>
    </div>

    <div class="card">
      <div id="alert" class="alert"></div>

      <form id="song-form">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="title" placeholder="Song title" required>
        </div>
        <div class="form-group">
          <label>Artist *</label>
          <input type="text" id="artist" placeholder="Artist name" required>
        </div>
        <div class="form-group">
          <label>Album</label>
          <input type="text" id="album" placeholder="Album name">
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="year" placeholder="2024" min="1900" max="2025">
        </div>
        <div class="form-group">
          <label>Genre</label>
          <select id="genre">
            <option value="">Select genre</option>
            <option>Rock</option>
            <option>Pop</option>
            <option>Hip-Hop</option>
            <option>Jazz</option>
            <option>Classical</option>
            <option>Electronic</option>
            <option>R&B</option>
            <option>Country</option>
            <option>Metal</option>
            <option>Grunge</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Duration (seconds)</label>
          <input type="number" id="duration" placeholder="240" min="0">
        </div>
        <div style="display:flex;gap:1rem;margin-top:1rem">
          <button type="submit" class="btn btn-primary" id="submit-btn">Save Song</button>
          <a href="/pages/index.html" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { songsAPI, requireAuth, showAlert, renderNavbar } from '../js/api.js';

    renderNavbar('add');
    if (!requireAuth()) throw new Error('not logged in');

    const params = new URLSearchParams(window.location.search);
    const editId = params.get('id');

    if (editId) {
      document.getElementById('form-title').textContent = 'Edit Song';
      songsAPI.getById(editId).then(song => {
        document.getElementById('title').value    = song.title;
        document.getElementById('artist').value   = song.artist;
        document.getElementById('album').value    = song.album || '';
        document.getElementById('year').value     = song.year || '';
        document.getElementById('genre').value    = song.genre || '';
        document.getElementById('duration').value = song.duration || '';
      });
    }

    document.getElementById('song-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;

      const body = {
        title:    document.getElementById('title').value,
        artist:   document.getElementById('artist').value,
        album:    document.getElementById('album').value,
        year:     parseInt(document.getElementById('year').value) || undefined,
        genre:    document.getElementById('genre').value,
        duration: parseInt(document.getElementById('duration').value) || 0,
      };

      try {
        if (editId) {
          await songsAPI.update(editId, body);
        } else {
          await songsAPI.create(body);
        }
        window.location.href = '/pages/index.html';
      } catch (err) {
        showAlert('alert', err.message);
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
