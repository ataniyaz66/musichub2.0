<!DOCTYPE html>

  <title>Admin — MusicHub</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    </div>

            <tr><td colspan="5" class="loading">Loading...</td></tr>

        </table>

    </div>
  </div>

  <script type="module" src="../js/admin.js"></script>
