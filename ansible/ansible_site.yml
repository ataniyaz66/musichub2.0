---
# Ansible Playbook: MusicHub SRE Deployment
# Usage: ansible-playbook -i inventory.ini site.yml

- name: Install Docker and dependencies
  hosts: all
  become: true
  vars:
    docker_compose_version: "2.24.0"
    app_dir: /opt/musichub

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
          - python3-pip
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

- name: Deploy MusicHub Application
  hosts: app_servers
  become: true
  vars:
    app_dir: /opt/musichub
    git_repo: "https://github.com/ataniyaz66/musichub2.0.git"

  tasks:
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Clone MusicHub repository
      git:
        repo: "{{ git_repo }}"
        dest: "{{ app_dir }}"
        version: main
        force: yes

    - name: Create .env file
      copy:
        content: |
          JWT_SECRET=musichub-super-secret-jwt-key-2024
          GRAFANA_PASSWORD=admin
          MONGO_URI_AUTH=mongodb://mongo:27017/auth-db
          MONGO_URI_SONGS=mongodb://mongo:27017/song-db
          MONGO_URI_USERS=mongodb://mongo:27017/user-db
          MONGO_URI_CHAT=mongodb://mongo:27017/chat-db
        dest: "{{ app_dir }}/.env"
        mode: '0600'

    - name: Pull Docker images
      command: docker compose pull
      args:
        chdir: "{{ app_dir }}"
      ignore_errors: yes

    - name: Build and start services
      command: docker compose up --build -d
      args:
        chdir: "{{ app_dir }}"

    - name: Wait for services to be healthy
      command: docker compose ps
      args:
        chdir: "{{ app_dir }}"
      register: compose_status
      retries: 10
      delay: 10
      until: "'healthy' in compose_status.stdout"

    - name: Verify auth service health
      uri:
        url: "http://localhost/api/auth/health"
        status_code: 200
      retries: 5
      delay: 5
      ignore_errors: yes

- name: Configure Monitoring
  hosts: monitoring_servers
  become: true
  vars:
    app_dir: /opt/musichub

  tasks:
    - name: Verify Prometheus is running
      uri:
        url: "http://localhost:9090/-/healthy"
        status_code: 200
      retries: 5
      delay: 5

    - name: Verify Grafana is running
      uri:
        url: "http://localhost:3001/api/health"
        status_code: 200
      retries: 5
      delay: 5

    - name: Print deployment summary
      debug:
        msg: |
          MusicHub deployed successfully!
          App: http://{{ inventory_hostname }}
          Prometheus: http://{{ inventory_hostname }}:9090
          Grafana: http://{{ inventory_hostname }}:3001
